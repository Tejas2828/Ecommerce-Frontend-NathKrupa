version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Vite build runs in "production" mode and auto-loads .env.production.
        # If you instead set env vars in the Amplify console, this line forwards
        # any VITE_-prefixed console vars into the build (overrides .env.production).
        - env | grep -e VITE_ >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
